name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh

      - name: Run prek hooks
        run: uvx prek run -a --show-diff-on-failure

  install-smoke:
    name: install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dotfiles into a temporary HOME
        env:
          DOTFILES_HOME: ${{ runner.temp }}/dotfiles-home
          REPO_URL: ${{ github.workspace }}
        run: |
          mkdir -p "$DOTFILES_HOME"
          HOME="$DOTFILES_HOME" bash "$GITHUB_WORKSPACE/install.sh"

      - name: Verify installed environment
        env:
          HOME: ${{ runner.temp }}/dotfiles-home
        run: |
          test -f "$HOME/.zshrc"
          test -f "$HOME/.config/zsh/.aliases.zsh"
          test -f "$HOME/.config/yadm/bootstrap"
          test ! -e "$HOME/.github"
          test ! -e "$HOME/README.md"
          git config --global --get init.defaultBranch | grep -qx main
          zsh -ic 'alias prek | grep -q "uvx prek"'
          zsh -ic 'alias git >/dev/null 2>&1 && exit 1 || exit 0'
